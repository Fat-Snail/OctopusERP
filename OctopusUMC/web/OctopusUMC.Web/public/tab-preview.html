<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>多 Tab 预览 — OctopusERP</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --background: #ffffff;
    --foreground: #0a0a0a;
    --card: #ffffff;
    --muted: #f4f4f5;
    --muted-foreground: #71717a;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --primary: #2563eb;
    --primary-soft: #eff6ff;
    --primary-soft-fg: #1d4ed8;
    --subtle: #fafafa;
    --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    --radius: 6px;
  }

  body {
    font-family: var(--font-sans);
    font-size: 13px;
    background: var(--background);
    color: var(--foreground);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TopBar ── */
  .topbar {
    height: 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    background: var(--card);
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted-foreground);
  }
  .topbar-breadcrumb span:last-child { color: var(--foreground); font-weight: 500; }
  .topbar-sep { color: var(--border-strong); }
  .topbar-spacer { flex: 1; }
  .topbar-search {
    height: 28px;
    width: 220px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--muted);
    padding: 0 10px;
    font-size: 12px;
    color: var(--muted-foreground);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .topbar-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted-foreground);
    transition: background .15s;
    border: none; background: transparent;
  }
  .topbar-icon:hover { background: var(--muted); }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--primary-soft);
    color: var(--primary-soft-fg);
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* ── Tab Bar ── */
  .tabbar {
    height: 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    background: var(--subtle);
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    padding-left: 4px;
    position: relative;
  }
  .tabbar::-webkit-scrollbar { display: none; }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    height: 32px;
    padding: 0 10px 0 12px;
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    margin-right: 2px;
    position: relative;
    top: 1px;
    transition: background .12s;
    user-select: none;
    color: var(--muted-foreground);
    background: transparent;
    max-width: 160px;
  }
  .tab:hover { background: var(--muted); color: var(--foreground); }

  .tab.active {
    background: var(--card);
    border-color: var(--border);
    color: var(--foreground);
    font-weight: 500;
    /* active 底部用白色盖住分隔线 */
    border-bottom: 1px solid var(--card);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--primary);
    border-radius: 2px 2px 0 0;
  }

  .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }

  .tab-close {
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--muted-foreground);
    transition: background .12s, color .12s;
    flex-shrink: 0;
    border: none; background: transparent; cursor: pointer;
    line-height: 1;
  }
  .tab-close:hover { background: #fee2e2; color: #ef4444; }
  .tab.active .tab-close:hover { background: #fee2e2; color: #ef4444; }

  .tab-home .tab-close { display: none; }

  .tabbar-actions {
    margin-left: auto;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 6px;
    height: 100%;
  }
  .tabbar-btn {
    width: 24px; height: 24px;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted-foreground);
    border: none; background: transparent;
    font-size: 14px;
    transition: background .12s;
  }
  .tabbar-btn:hover { background: var(--muted); }

  /* ── Context Menu ── */
  .ctx-menu {
    position: fixed;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,.10);
    padding: 4px;
    z-index: 9999;
    min-width: 140px;
    display: none;
  }
  .ctx-menu.visible { display: block; }
  .ctx-item {
    padding: 7px 12px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--foreground);
    transition: background .1s;
  }
  .ctx-item:hover { background: var(--muted); }
  .ctx-item.danger { color: #ef4444; }
  .ctx-item.danger:hover { background: #fee2e2; }
  .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

  /* ── Main layout ── */
  .shell {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Module Rail */
  .rail {
    width: 56px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    gap: 2px;
    flex-shrink: 0;
  }
  .rail-logo {
    width: 32px; height: 32px;
    background: var(--primary);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700;
    margin-bottom: 10px;
  }
  .rail-item {
    width: 40px; height: 40px;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted-foreground);
    font-size: 16px;
    transition: background .15s, color .15s;
    border: none; background: transparent;
  }
  .rail-item:hover { background: var(--muted); color: var(--foreground); }
  .rail-item.active { background: var(--primary-soft); color: var(--primary-soft-fg); }
  .rail-spacer { flex: 1; }

  /* SubMenu */
  .submenu {
    width: 200px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 8px;
    overflow-y: auto;
    flex-shrink: 0;
    gap: 1px;
  }
  .submenu-title {
    padding: 0 8px 10px;
  }
  .submenu-title-main { font-size: 14px; font-weight: 600; }
  .submenu-title-sub { font-size: 11px; color: var(--muted-foreground); font-family: monospace; margin-top: 1px; }
  .submenu-group {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted-foreground);
    padding: 8px 8px 4px;
    margin-top: 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 32px;
    padding: 0 8px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    color: var(--muted-foreground);
    transition: background .12s, color .12s;
    border: none; background: transparent; width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--muted); color: var(--foreground); }
  .nav-item.active { background: var(--primary-soft); color: var(--primary-soft-fg); }

  /* Content */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: var(--subtle);
  }

  .page-placeholder {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
  }
  .page-placeholder h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .page-placeholder p { font-size: 13px; color: var(--muted-foreground); }

  /* Badge indicator for tab count */
  .tab-count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    background: var(--primary-soft);
    color: var(--primary-soft-fg);
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
  }

  /* Demo note */
  .demo-note {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--foreground);
    color: var(--background);
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    line-height: 1.6;
    max-width: 280px;
    z-index: 999;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
  }
  .demo-note strong { font-weight: 600; }

  /* Scroll buttons */
  .tabbar-scroll {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    padding: 0 2px;
  }
</style>
</head>

<script>
// Tab state
let tabs = [
  { id: 'user', title: '用户管理', closable: true }
]
let activeTab = 'user'
let ctxTargetId = null

function renderTabs() {
  const bar = document.getElementById('tabbar')
  const actions = bar.querySelector('.tabbar-actions')
  // remove old tabs
  bar.querySelectorAll('.tab').forEach(el => el.remove())
  tabs.forEach(tab => {
    const el = document.createElement('div')
    el.className = 'tab' + (tab.id === activeTab ? ' active' : '') + (!tab.closable ? ' tab-home' : '')
    el.dataset.id = tab.id
    el.innerHTML = `
      <span class="tab-title">${tab.title}</span>
      ${tab.closable ? `<button class="tab-close" data-id="${tab.id}" title="关闭">✕</button>` : ''}
    `
    el.addEventListener('click', (e) => {
      if (e.target.closest('.tab-close')) return
      switchTab(tab.id)
    })
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault()
      showCtxMenu(e, tab.id)
    })
    bar.insertBefore(el, actions)
  })
  // close buttons
  bar.querySelectorAll('.tab-close').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation()
      closeTab(btn.dataset.id)
    })
  })
  // update breadcrumb
  const active = tabs.find(t => t.id === activeTab)
  if (active) {
    document.getElementById('bc-current').textContent = active.title
    document.getElementById('page-title').textContent = active.title
    document.getElementById('page-desc').textContent = `当前页面：${active.title} · 点击左侧菜单或上方 Tab 切换页面`
  }
  // update nav items active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') && el.getAttribute('onclick').includes(`'${activeTab}'`))
  })
}

function openTab(id, title) {
  const exists = tabs.find(t => t.id === id)
  if (!exists) {
    tabs.push({ id, title, closable: true })
  }
  switchTab(id)
}

function switchTab(id) {
  activeTab = id
  renderTabs()
  // scroll tab into view
  const el = document.querySelector(`.tab[data-id="${id}"]`)
  if (el) el.scrollIntoView({ inline: 'nearest', block: 'nearest' })
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id)
  if (idx < 0) return
  tabs.splice(idx, 1)
  if (tabs.length === 0) {
    tabs = [{ id: 'user', title: '用户管理', closable: true }]
    activeTab = 'user'
  } else if (activeTab === id) {
    activeTab = tabs[Math.min(idx, tabs.length - 1)].id
  }
  renderTabs()
}

function closeAllTabs() {
  tabs = [{ id: 'user', title: '用户管理', closable: true }]
  activeTab = 'user'
  renderTabs()
  hideCtxMenu()
}

// Context menu
function showCtxMenu(e, id) {
  ctxTargetId = id
  const menu = document.getElementById('ctxMenu')
  menu.classList.add('visible')
  let x = e.clientX, y = e.clientY
  menu.style.left = x + 'px'
  menu.style.top = y + 'px'
  // adjust if overflow
  const rect = menu.getBoundingClientRect()
  if (rect.right > window.innerWidth) menu.style.left = (x - rect.width) + 'px'
  if (rect.bottom > window.innerHeight) menu.style.top = (y - rect.height) + 'px'
}
function hideCtxMenu() {
  document.getElementById('ctxMenu').classList.remove('visible')
  ctxTargetId = null
}
function ctxClose() { if (ctxTargetId) closeTab(ctxTargetId); hideCtxMenu() }
function ctxRefresh() { hideCtxMenu() /* no-op in preview */ }
function ctxCloseOther() {
  tabs = tabs.filter(t => t.id === ctxTargetId)
  activeTab = ctxTargetId
  hideCtxMenu()
  renderTabs()
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#ctxMenu')) hideCtxMenu()
})

// init
renderTabs()
</script>
</body>
</html>
